name: 채용공고 확인 및 텔레그램 알림

on:
  schedule:
    # 매 2시간마다 실행 (UTC 기준, 한국시간은 +9시간)
    - cron: '17 */2 * * *'
  workflow_dispatch:  # 수동 실행 버튼도 사용 가능

# 동시 실행 방지: 실행이 겹치면 앞선 실행이 끝날 때까지 대기 (git 경합 원천 차단)
concurrency:
  group: job-alert-bot
  cancel-in-progress: false

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium --with-deps

      - name: 스크립트 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python notify_bot.py

      - name: 결과 저장 (seen_jobs.json 커밋)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "채용공고 확인 결과 업데이트"
          git config pull.rebase false
          git pull origin main -X ours
          git push
